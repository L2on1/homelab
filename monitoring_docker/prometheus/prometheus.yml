global:
  scrape_interval: 15s
  evaluation_interval: 30s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    metrics_path: /metrics
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'process-exporter'
    static_configs:
      - targets: ['process-exporter:9256']

  - job_name: 'speedtest'
    metrics_path: /probe
    params:
      script: [speedtest]           
    scrape_interval: 30m            
    scrape_timeout: 10m              
    static_configs:
      - targets: ['speedtest-exporter:9469']
    relabel_configs:                 
      - source_labels: [__address__]
        target_label: instance
      - target_label: __address__
        replacement: speedtest-exporter:9469

  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ['https://haribon.me','https://google.com','https://1.1.1.1'] 
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
